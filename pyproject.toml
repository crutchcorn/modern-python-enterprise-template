[project]
name = "modern-python-enterprise-template"
version = "0.0.1"
description = "A modern Python template for enterprise applications."
readme = "README.md"
requires-python = ">=3.14"

[tool.uv.workspace]
members = [
    "apps/*",
    "packages/*",
]

[dependency-groups]
dev = [
    "poethepoet>=0.44.0"
]

[tool.poe.tasks]
gen_reqs = "bazel run //:generate_requirements_lock" # Run this after adding new dependencies, even via UV
build = "bazel build"
test = "bazel test"
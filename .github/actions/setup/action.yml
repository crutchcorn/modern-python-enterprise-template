name: Setup
description: Checkout, install uv, pnpm, Node, npm deps, and configure Bazel

inputs:
  disk-cache:
    description: Bazel disk cache key
    required: false
    default: ""
  cache-save:
    description: Whether to save Bazel caches
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      shell: bash
      run: uv python install

    # v6 uses pnpm 11 which writes a second YAML document to pnpm-lock.yaml,
    # breaking Bazel's yq-based lockfile parsing.
    # See: https://github.com/pnpm/action-setup/issues/225
    # See: https://github.com/aspect-build/rules_js/issues/2798
    - uses: pnpm/action-setup@v5
      with:
        cache: true

    - uses: actions/setup-node@v6
      with:
        node-version-file: ".nvmrc"

    - name: Install npm dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - uses: bazel-contrib/setup-bazel@0.19.0
      with:
        bazelisk-cache: true
        disk-cache: ${{ inputs.disk-cache }}
        repository-cache: true
        cache-save: ${{ inputs.cache-save }}
